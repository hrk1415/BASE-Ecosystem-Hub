<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script id="ethereum-error-handler">
      // 1. Intercept Object.defineProperty to prevent Uncaught TypeError: Cannot redefine property: ethereum
      (function() {
        try {
          const originalDefineProperty = Object.defineProperty;
          Object.defineProperty = function(obj, prop, descriptor) {
            if (prop === 'ethereum') {
              try {
                return originalDefineProperty.call(this, obj, prop, descriptor);
              } catch (e) {
                console.warn("Intercepted and avoided crash for redefining 'ethereum' property:", e);
                // Gracefully fallback to assignment or simple return
                try {
                  obj[prop] = descriptor.value;
                } catch (assignError) {}
                return obj;
              }
            }
            return originalDefineProperty.call(this, obj, prop, descriptor);
          };
        } catch (err) {
          console.error("Could not register object property interceptor:", err);
        }
      })();

      // 2. Prevent browser extension or multi-wallet collision errors in the sandbox
      window.addEventListener('error', function(event) {
        if (event.error && (
          (event.error.message && event.error.message.indexOf('Cannot redefine property: ethereum') !== -1) ||
          (event.message && event.message.indexOf('Cannot redefine property: ethereum') !== -1)
        )) {
          console.warn('Swallowed ethereum redefinition error safely:', event.message || event.error.message);
          event.preventDefault();
          event.stopImmediatePropagation();
        }
      }, true);

      window.addEventListener('unhandledrejection', function(event) {
        if (event.reason && (
          (event.reason.message && event.reason.message.indexOf('Cannot redefine property: ethereum') !== -1)
        )) {
          console.warn('Swallowed ethereum redefinition promise rejection safely:', event.reason.message);
          event.preventDefault();
          event.stopImmediatePropagation();
        }
      }, true);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
